# Prometheus Configuration for Library Management System
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'library-management-monitor'
    environment: 'production'

# Alertmanager configuration (optional)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

# Load rules once and periodically evaluate them
# rule_files:
#   - "alert_rules.yml"

# Scrape configurations
scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  # Flask Application Metrics
  - job_name: 'flask-app'
    scrape_interval: 10s
    static_configs:
      - targets: ['flask:5000']
        labels:
          service: 'library-flask-app'
          app: 'library-management'
    metrics_path: '/metrics'

  # MySQL Exporter (optional - requires mysql_exporter)
  - job_name: 'mysql'
    static_configs:
      - targets: ['mysql-exporter:9104']
        labels:
          service: 'mysql-database'
    # Uncomment if mysql-exporter is added to docker-compose

  # Nginx Metrics (via stub_status)
  - job_name: 'nginx'
    scrape_interval: 10s
    static_configs:
      - targets: ['nginx:80']
        labels:
          service: 'nginx-proxy'
    metrics_path: '/nginx_status'

  # Node Exporter for system metrics (optional)
  # - job_name: 'node-exporter'
  #   static_configs:
  #     - targets: ['node-exporter:9100']
  #       labels:
  #         service: 'host-system'

  # cAdvisor for container metrics (optional)
  # - job_name: 'cadvisor'
  #   static_configs:
  #     - targets: ['cadvisor:8080']
  #       labels:
  #         service: 'docker-containers'
